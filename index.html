<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vowel Counter & Clock</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #1d3557, #457b9d, #a8dadc);
        color: #fff;
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        overflow: hidden;
      }

      .card {
        background: #fff;
        color: #333;
        border-radius: 15px;
        box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }

      textarea {
        width: 100%;
        height: 150px;
        border: 2px dashed #457b9d;
        border-radius: 8px;
        padding: 15px;
        font-size: 16px;
        resize: none;
      }

      textarea:focus {
        outline: none;
        border-color: #1d3557;
        box-shadow: 0 0 10px rgba(29, 53, 87, 0.5);
      }

      .btn-custom {
        background-color: #1d3557;
        color: #fff;
        font-weight: bold;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        margin: 5px;
        transition: all 0.3s;
      }

      .btn-custom:hover {
        background-color: #457b9d;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
      }

      .time-display {
        font-size: 1.5rem;
        color: #1d3557;
        text-align: center;
        margin-top: 20px;
        font-weight: bold;
      }

      h2 {
        color: #e63946;
        font-size: 2rem;
        margin: 20px 0;
      }

      footer {
        text-align: center;
        margin-top: 20px;
        color: #333;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="card text-center">
      <h1>Vowel Counter & Live Clock</h1>
      <p>Type in the box below and count the vowels!</p>

      <form>
        <textarea
          id="textarea"
          placeholder="Type your text here..."
        ></textarea>
        <h2 id="vowel-count">0</h2>
        <button type="button" class="btn btn-custom" id="count-btn">Count</button>
        <button type="button" class="btn btn-custom" id="reset-btn">Reset</button>
      </form>

      <div class="time-display" id="clock"></div>
    </div>

    <script>
      const textarea = document.querySelector("#textarea");
      const countBtn = document.querySelector("#count-btn");
      const resetBtn = document.querySelector("#reset-btn");
      const vowelCountDisplay = document.querySelector("#vowel-count");
      const clockDisplay = document.querySelector("#clock");

      // Count vowels function
      countBtn.addEventListener("click", () => {
        const vowels = textarea.value.match(/[aeiou]/gi) || [];
        vowelCountDisplay.textContent = vowels.length;
      });

      // Reset function
      resetBtn.addEventListener("click", () => {
        textarea.value = "";
        vowelCountDisplay.textContent = "0";
      });

      // Clock function
      function updateClock() {
        const date = new Date();
        let hours = date.getHours();
        let minutes = date.getMinutes();
        let seconds = date.getSeconds();
        const period = hours >= 12 ? "PM" : "AM";

        if (hours > 12) hours -= 12;
        if (hours === 0) hours = 12;

        hours = hours < 10 ? "0" + hours : hours;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        clockDisplay.textContent = `${hours}:${minutes}:${seconds} ${period}`;
      }

      setInterval(updateClock, 1000);
      updateClock();
    </script>
  </body>
</html>
